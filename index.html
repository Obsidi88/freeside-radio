<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freeside Radio</title>
  <link id="favicon" rel="icon" href="default.ico" type="image/x-icon">
  <style>
    @font-face {
      font-family: 'VT323';
      src: url('VT323/VT323-Regular.ttf') format('truetype');
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .online {
      cursor: pointer;
    }

    canvas {
        display: block;
    }
  </style>
</head>
<body>
  <script>
    const pairs = [
          { title: "Facebook", favicon: "facebook.ico" },
          { title: "Feed | LinkedIn", favicon: "linkedin.ico" }
          { title: "Myspace", favicon: "myspace.ico" }
    ];

    const randomPair = pairs[Math.floor(Math.random() * pairs.length)];
 
        document.title = randomPair.title;
      document.getElementById("favicon").href = randomPair.favicon;
  </script>
  <audio id="radio" preload="none" src="https://mixnet.dev/stream"></audio> <!-- don't remove the url to make mpv work -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const url = 'https://mixnet.dev/stream';
    const statusUrl = 'https://mixnet.dev/status-json.xsl';

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
    camera.position.z = 1;

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Create a canvas texture with the text
    const textCanvas = document.createElement('canvas');
    const ctx = textCanvas.getContext('2d');
    textCanvas.width = window.innerWidth;
    textCanvas.height = window.innerHeight;

    const Status = { LOADING: 'loading', ONLINE: 'online', OFFLINE: 'offline' };
    let isPlaying = false;
    let status = Status.LOADING;
    let description = '';
    const audio = document.getElementById('radio');

    function drawText() {
      ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
      ctx.fillStyle = '#ffffff';

      const titleSize = Math.min(textCanvas.width / 12, 120);
      const fontSize = Math.min(textCanvas.width / 20, 64);

      ctx.font = 'bold ' + titleSize + 'px "VT323", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('radio freeside', textCanvas.width / 2, textCanvas.height * 0.4);

      let yOffset = textCanvas.height * 0.4 + titleSize * 1.2;

      ctx.font = 'bold ' + fontSize + 'px "VT323", monospace';

      if (description) {
        ctx.fillText(description, textCanvas.width / 2, yOffset);
        yOffset += fontSize * 1.2;
      }

      const subtitle = {
        [Status.LOADING]: 'tuning in...',
        [Status.ONLINE]: isPlaying ? '' : 'click to play',
        [Status.OFFLINE]: 'we\'re offline',
      }[status];
      ctx.fillText(subtitle, textCanvas.width / 2, yOffset);
    }
    drawText();

    const textTexture = new THREE.CanvasTexture(textCanvas);
    textTexture.minFilter = THREE.LinearFilter;
    textTexture.magFilter = THREE.LinearFilter;

    // Glitch shader material
    const glitchMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTexture: { value: textTexture },
        uTime: { value: 0.0 },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D uTexture;
        uniform float uTime;
        uniform vec2 uResolution;
        varying vec2 vUv;

        float random(vec2 st) {
          return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
        }

        float randomLine(float seed) {
          return fract(sin(seed * 127.1) * 43758.5453);
        }

        void main() {
          vec2 uv = vUv;

          // Time-based glitch triggers
          float glitchStrength = step(0.92, random(vec2(floor(uTime * 3.0), 0.0)));
          float glitchStrength2 = step(0.85, random(vec2(floor(uTime * 7.0), 1.0)));

          // Horizontal block displacement
          float blockY = floor(uv.y * 20.0);
          float blockShift = (random(vec2(blockY, floor(uTime * 12.0))) - 0.5) * 0.08 * glitchStrength;

          // Scanline-style slice displacement
          float sliceY = floor(uv.y * 80.0);
          float sliceShift = (random(vec2(sliceY, floor(uTime * 20.0))) - 0.5) * 0.03 * glitchStrength2;

          // Persistent subtle jitter
          float microJitter = (random(vec2(floor(uv.y * 200.0), floor(uTime * 30.0))) - 0.5) * 0.003;

          vec2 displaced = uv;
          displaced.x += blockShift + sliceShift + microJitter;

          // RGB channel splitting (chromatic aberration)
          float rgbShift = 0.004 + 0.02 * glitchStrength + 0.008 * glitchStrength2;

          float r = texture2D(uTexture, vec2(displaced.x + rgbShift, displaced.y)).r;
          float g = texture2D(uTexture, displaced).g;
          float b = texture2D(uTexture, vec2(displaced.x - rgbShift, displaced.y)).b;

          vec3 color = vec3(r, g, b);

          // Random color block flash
          float flashBlock = step(0.97, random(vec2(floor(uv.y * 15.0), floor(uTime * 5.0)))) * glitchStrength;
          color = mix(color, vec3(
            random(vec2(floor(uTime * 10.0), 0.1)),
            random(vec2(floor(uTime * 10.0), 0.2)),
            random(vec2(floor(uTime * 10.0), 0.3))
          ), flashBlock * 0.6);

          // Scanlines
          float scanline = sin(uv.y * uResolution.y * 1.5) * 0.04;
          color -= scanline;

          // Occasional full-frame static burst
          float staticBurst = step(0.96, random(vec2(floor(uTime * 2.0), 3.0)));
          float noise = random(uv + fract(uTime)) * 0.15 * staticBurst;
          color += noise;

          gl_FragColor = vec4(color, 1.0);
        }
      `
    });

    const plane = new THREE.PlaneGeometry(2, 2);
    const mesh = new THREE.Mesh(plane, glitchMaterial);
    scene.add(mesh);

    function onResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      textCanvas.width = w;
      textCanvas.height = h;
      drawText();
      textTexture.dispose();
      textTexture.image = textCanvas;
      textTexture.needsUpdate = true;
      glitchMaterial.uniforms.uResolution.value.set(w, h);
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', () => setTimeout(onResize, 100));


    async function checkStream() {
      try {
        const response = await fetch(statusUrl);
        const data = await response.json();
        if (data.icestats && data.icestats.source) {
          status = Status.ONLINE;
          description = data.icestats.source.server_description || '';
        } else {
          status = Status.OFFLINE;
          description = '';
        }
      } catch (e) {
        status = Status.OFFLINE;
        description = '';
      }
      drawText();
      textTexture.needsUpdate = true;
      switch (status) {
        case Status.ONLINE:  document.body.className = 'online'; break;
        case Status.OFFLINE: document.body.className = 'offline'; break;
        case Status.LOADING: document.body.className = 'loading'; break;
      }
    }

    checkStream();
    setInterval(checkStream, 10000);

    document.addEventListener('click', () => {
      if (status !== Status.ONLINE) {
        return;
      }

      if (isPlaying) {
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
      } else {
        audio.src = url + '?fuckcaching=' + Date.now();
        audio.load();
        audio.play();
      }
      isPlaying = !isPlaying;
      drawText();
      textTexture.needsUpdate = true;
    });

    function animate(time) {
      requestAnimationFrame(animate);
      glitchMaterial.uniforms.uTime.value = time * 0.001;
      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
